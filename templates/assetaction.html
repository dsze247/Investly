{% extends "base.html" %}

{% block content %}
<h2>{% if preselected_watchlist %}Add to Watchlist{% else %}Trade Asset{% endif %}</h2>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" action="/assetaction">
    {% if preselected_watchlist %}
    <input type="hidden" name="watchlist_id" value="{{ preselected_watchlist }}">

    <div class="mb-3">
        <label class="form-label">Asset</label>
        <select name="asset_id" class="form-select" required>
            <option value="">Select an asset</option>
            {% for a in assets %}
            <option value="{{ a[0] }}">{{ a[1] }} — {{ a[2] }} ({{ a[3] }})</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Max Price ($)</label>
        <input type="number" name="max_price" class="form-control" step="0.01" min="0">
    </div>

    <div class="mb-3">
        <label class="form-label">Min Price ($)</label>
        <input type="number" name="min_price" class="form-control" step="0.01" min="0">
    </div>

    {% else %}

    <div class="mb-3">
        <label class="form-label">Portfolio</label>
        <select name="portfolio_id" class="form-select" required>
            <option value="">Select a portfolio</option>
            {% for p in portfolios %}
            <option value="{{ p[4] }}" {% if preselected_portfolio == p[4]|string %}selected{% endif %}>{{ p[0] }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Asset</label>
        <select name="asset_id" class="form-select" required>
            <option value="">Select an asset</option>
            {% for a in assets %}
            <option value="{{ a[0] }}">{{ a[1] }} — {{ a[2] }} ({{ a[3] }})</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Transaction Type</label>
        <div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="transaction_type" value="Buy" id="typeBuy" checked>
                <label class="form-check-label" for="typeBuy">Buy</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="transaction_type" value="Sell" id="typeSell">
                <label class="form-check-label" for="typeSell">Sell</label>
            </div>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Quantity</label>
        <input type="number" name="quantity" class="form-control" step="0.01" min="0.01" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Price Per Unit ($)</label>
        <input type="number" name="price" class="form-control" step="0.01" min="0.01" required>
    </div>
    {% endif %}

    <button type="submit" class="btn btn-primary">Submit Transaction</button>
    <a href="/dashboard" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>
{% endblock %}
