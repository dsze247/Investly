<!DOCTYPE html>
<html>
<head>
    <title>Investly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">
        <a class="navbar-brand" href="/">Investly</a>
        {% if session.get("user_id") %}
        <div>
            <a href="/search" class="btn btn-outline-light btn-sm me-2">Search</a>
            <span class="text-light me-3">{{ session["first_name"] }} {{ session["last_name"] }}</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Log Out</a>
        </div>
        {% else %}
        <div>
            <a href="/login" class="btn btn-outline-light btn-sm me-2">Log In</a>
            <a href="/signup" class="btn btn-light btn-sm">Sign Up</a>
        </div>
        {% endif %}
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
