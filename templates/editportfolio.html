{% extends "base.html" %}

{% block content %}
<h2>Edit Portfolio</h2>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" action="/portfoliodetails/{{ portfolio_id }}/edit">
    <div class="mb-3">
        <label class="form-label">Portfolio Name</label>
        <input type="text" name="portfolio_name" class="form-control" value="{{ info[0] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Risk Profile</label>
        <select name="risk_profile" class="form-select" required>
            <option value="Conservative" {% if info[1] == "Conservative" %}selected{% endif %}>Conservative</option>
            <option value="Moderate" {% if info[1] == "Moderate" %}selected{% endif %}>Moderate</option>
            <option value="Aggressive" {% if info[1] == "Aggressive" %}selected{% endif %}>Aggressive</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="/portfoliodetails/{{ portfolio_id }}" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>

<hr class="mt-4">
<a href="/portfoliodetails/{{ portfolio_id }}/delete" class="btn btn-danger"
   onclick="return confirm('Are you sure you want to delete this portfolio?')">Delete Portfolio</a>
{% endblock %}
