{% extends "base.html" %}

{% block content %}
<h2>Edit Watchlist</h2>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" action="/watchlistdetails/{{ watchlist_id }}/edit">
    <div class="mb-3">
        <label class="form-label">Watchlist Name</label>
        <input type="text" name="watchlist_name" class="form-control" value="{{ info[0] }}" required>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="/watchlistdetails/{{ watchlist_id }}" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>

<hr class="mt-4">
<a href="/watchlistdetails/{{ watchlist_id }}/delete" class="btn btn-danger"
   onclick="return confirm('Are you sure you want to delete this watchlist?')">Delete Watchlist</a>
{% endblock %}
